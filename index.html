<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="小さなゲームとテンプレートを探索するポータルサイト。">
  <title>TinyPortal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-site">
  <header class="site-header portal-header">
    <a class="brand portal-brand" href="index.html" aria-label="TinyPortal">
      <span class="brand-mark portal-brand-mark" aria-hidden="true"></span>
      <span>TinyPortal</span>
    </a>
    <nav class="site-nav portal-nav" aria-label="サイト内ナビゲーション">
      <a href="games.html">Games</a>
      <a href="templates.html">Templates</a>
    </nav>
  </header>

  <main>
    <section class="portal-hero" aria-labelledby="site-title">
      <div class="world-art" aria-label="階段とアーチが浮かぶインディーゲーム風のキービジュアル">
        <span class="world-sun"></span>
        <span class="world-arch world-arch-left"></span>
        <span class="world-arch world-arch-right"></span>
        <span class="world-column world-column-left"></span>
        <span class="world-column world-column-right"></span>
        <span class="world-stair world-stair-one"></span>
        <span class="world-stair world-stair-two"></span>
        <span class="world-stair world-stair-three"></span>
        <span class="world-object world-object-pink"></span>
        <span class="world-object world-object-green"></span>
        <span class="world-door"></span>
        <div class="portal-hero-copy">
          <p class="section-label">tiny indie gateway</p>
          <h1 id="site-title">TinyPortal</h1>
        </div>
      </div>
    </section>

    <section class="portal-gateway" aria-label="ポータルメニュー">
      <a class="portal-card ui-card" href="games.html">
        <span class="portal-card-art portal-card-games" aria-hidden="true"></span>
        <span class="portal-card-kicker">play room</span>
        <strong>Games</strong>
        <small>小さく遊べるゲームの入口。</small>
      </a>

      <a class="portal-card ui-card" href="templates.html">
        <span class="portal-card-art portal-card-templates" aria-hidden="true"></span>
        <span class="portal-card-kicker">tool shelf</span>
        <strong>Templates</strong>
        <small>個人サイト向けテンプレート集。</small>
      </a>
    </section>
  </main>

  <footer class="site-footer portal-footer">
    <p>© 2026 TinyPortal</p>
  </footer>
</body>
</html>
