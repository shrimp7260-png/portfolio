<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="やさしく遊べる小さなゲームたち。">
  <title>Mellow Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="#" aria-label="Mellow Games home">
      <span class="logo-mark" aria-hidden="true">✦</span>
      <span>Mellow Games</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="#games">Games</a>
    </nav>
  </header>

  <main>
    <section class="hero" aria-labelledby="page-title">
      <div class="hero-copy">
        <p class="eyebrow">Small Web Game Collection</p>
        <h1 id="page-title">Mellow Games</h1>
        <p class="lead">やさしく遊べる小さなゲームたち。</p>
      </div>

      <div class="hero-visual" aria-label="やわらかいゲーム作品集のイラスト">
        <div class="visual-card visual-card-main">
          <span class="visual-icon">☕</span>
          <span class="visual-line visual-line-long"></span>
          <span class="visual-line"></span>
        </div>
        <div class="visual-card visual-card-small top">
          <span>🧾</span>
        </div>
        <div class="visual-card visual-card-small bottom">
          <span>🍖</span>
        </div>
        <span class="dot dot-green"></span>
        <span class="dot dot-yellow"></span>
        <span class="soft-shape shape-one"></span>
        <span class="soft-shape shape-two"></span>
      </div>
    </section>

    <section class="games-section" id="games" aria-labelledby="games-title">
      <div class="section-heading">
        <p class="eyebrow">Games</p>
        <h2 id="games-title">ゲーム一覧</h2>
      </div>

      <div class="game-grid">
        <article class="game-card">
          <div class="game-icon" aria-hidden="true">🧾</div>
          <h3>レジ打ちゲーム</h3>
          <p>流れてくる商品の値段を素早く入力するカジュアルゲーム。</p>
          <a class="play-button" href="https://shrimp7260-png.github.io/cashier_game/">Play</a>
        </article>

        <article class="game-card">
          <div class="game-icon" aria-hidden="true">🍖</div>
          <h3>焼き加減ゲーム</h3>
          <p>ちょうどいい焼き加減で止めるタイミングゲーム。</p>
          <a class="play-button" href="https://shrimp7260-png.github.io/grill_game/">Play</a>
        </article>

        <article class="game-card">
          <div class="game-icon" aria-hidden="true">☕</div>
          <h3>ミニカフェゲーム</h3>
          <p>ボタン操作でドリンクを作るシンプル操作ゲーム。</p>
          <a class="play-button" href="https://shrimp7260-png.github.io/cafe_button/">Play</a>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Mellow Games</p>
  </footer>
</body>
</html>
